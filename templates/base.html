<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneMeds</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2.0">
</head>

<body>
    <script>
        window.DjangoUrls = {
            home: "{% url 'home' %}",
            search: "{% url 'search' %}",
            profile: "{% if user.is_authenticated %}{% url 'profile' %}{% else %}''{% endif %}",
            cart: "{% if user.is_authenticated %}{% url 'cart_view' %}{% else %}''{% endif %}",
            reminderList: "{% if user.is_authenticated %}{% url 'reminder_list' %}{% else %}''{% endif %}",
            login: "{% url 'login' %}",
            register: "{% url 'register' %}",
            hospitalList: "{% url 'hospital_list' %}",
            doctorList: "{% url 'doctor_list' %}",
            labTestList: "{% url 'lab_test_list' %}",
            medicineList: "{% url 'medicine_list' %}",
            about: "{% url 'about' %}",
            contact: "{% url 'contact' %}",
            help: "{% url 'help' %}",
            terms: "{% url 'terms' %}",
            privacy: "{% url 'privacy' %}"
        };
        window.DjangoContext = {
            isAuthenticated: "{{ user.is_authenticated|yesno:'true,false' }}" === "true",
            userLocation: "{{ request.session.user_location|default:''|escapejs }}",
            cartCount: parseInt("{{ cart_count|default:0 }}", 10),
            hospitalSpecialties: [
                {% for s in sidebar_hospital_specialties %}
                { name: "{{ s.name|escapejs }}", iconUrl: "{% if s.icon %}{{ s.icon.url|escapejs }}{% endif %}" }{% if not forloop.last %},{% endif %}
                {% endfor %}
            ],
            doctorSpecialties: [
                {% for s in sidebar_doctor_specialties %}
                { name: "{{ s.name|escapejs }}", iconUrl: "{% if s.icon %}{{ s.icon.url|escapejs }}{% endif %}" }{% if not forloop.last %},{% endif %}
                {% endfor %}
            ],
            labCategories: [
                {% for c in sidebar_lab_categories %}
                { name: "{{ c.name|escapejs }}", iconUrl: "{% if c.icon %}{{ c.icon.url|escapejs }}{% endif %}" }{% if not forloop.last %},{% endif %}
                {% endfor %}
            ]
        };
    </script>
    <div id="django-server-content">
        {% block content %}{% endblock %}
    </div>

    <div id="react-app-root"></div>

    <div id="react-nav-handler-root"></div>
    <div id="react-location-modal-root" 
         data-is-mandatory="{{ user.is_authenticated|yesno:'true,false' }}"
         data-has-location="{% if request.session.user_location %}true{% else %}false{% endif %}"
         data-current-location="{{ request.session.user_location|default:'' }}"
         data-set-location-url="{% url 'set_location' %}"
         data-csrf-token="{{ csrf_token }}"></div>

    <!-- Inject Vite React Output -->
    <script type="module" src="{% static 'dist/js/main.js' %}"></script>
</body>
</html>
