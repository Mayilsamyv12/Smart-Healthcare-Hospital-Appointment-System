<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneMeds</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2.2">
    <!-- Vite loads component-specific CSS dynamically -->
</head>

<body>
    <script>
        window.DjangoUrls = {
            home: "{% url 'home' %}",
            search: "{% url 'search' %}",
            profile: "{% if user.is_authenticated %}/patient/profile/{% else %}''{% endif %}",
            cart: "{% if user.is_authenticated %}{% url 'commerce:cart_view' %}{% else %}''{% endif %}",
            reminderList: "{% if user.is_authenticated %}{% url 'reminder_list' %}{% else %}''{% endif %}",
            login: "{% url 'login' %}",
            register: "{% url 'register' %}",
            hospitalList: "{% url 'hospital_list' %}",
            doctorList: "{% url 'doctor_list' %}",
            labTestList: "{% url 'commerce:lab_test_list' %}",
            medicineList: "{% url 'commerce:medicine_list' %}",
            about: "{% url 'about' %}",
            contact: "{% url 'contact' %}",
            help: "{% url 'help' %}",
            terms: "{% url 'terms' %}",
            privacy: "{% url 'privacy' %}"
        };
        window.DjangoContext = {
            isAuthenticated: "{{ user.is_authenticated|yesno:'true,false' }}" === "true",
            isStaff: "{{ user.is_staff|yesno:'true,false' }}" === "true",
            username: "{{ user.username|escapejs }}",
            userLocation: "{{ request.session.user_location|default:''|escapejs }}",
            cartCount: parseInt("{{ cart_count|default:0 }}", 10),
            reminderCount: parseInt("{{ reminder_count|default:0 }}", 10),
            hospitalSpecialties: [],
            doctorSpecialties: [],
            labCategories: []
        };
    </script>
    <div id="django-server-content" style="display: none;">
        {% block content %}{% endblock %}
    </div>

    <div id="react-app-root"></div>

    <div id="react-nav-handler-root"></div>
    <div id="react-location-modal-root" 
         data-is-mandatory="{% if user.is_authenticated %}{% if 'doctor' in request.path %}false{% else %}true{% endif %}{% else %}false{% endif %}"
         data-has-location="{% if request.session.user_location %}true{% else %}false{% endif %}"
         data-current-location="{{ request.session.user_location|default:'' }}"
         data-set-location-url="{% url 'set_location' %}"
         data-csrf-token="{{ csrf_token }}"></div>

    <!-- Inject Vite React Output -->
    <script type="module" src="{% static 'dist/js/main.js' %}"></script>
</body>
</html>
