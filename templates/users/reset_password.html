{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="form-card">
        <h2>Reset Password</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 2rem;">Enter your new password below.</p>
        <form method="post">
            {% csrf_token %}
            {% if error %}
            <div style="color: #ef4444; margin-bottom: 1rem; text-align: center;">{{ error }}</div>
            {% endif %}
            <div class="form-group">
                <label class="form-label">New Password</label>
                <div style="position: relative;">
                    <input type="password" name="password" id="id_new_password" class="form-input" placeholder="Enter new password" style="padding-right: 3rem;" required>
                    <span onclick="togglePassword('id_new_password', this)"
                        style="position: absolute; right: 15px; top: 0; bottom: 0; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #94a3b8;">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path class="eye-open-path" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            <path class="eye-closed-path" style="display: none;" d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                        </svg>
                    </span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div style="position: relative;">
                    <input type="password" name="confirm_password" id="id_confirm_password" class="form-input" placeholder="Confirm new password" style="padding-right: 3rem;" required>
                    <span onclick="togglePassword('id_confirm_password', this)"
                        style="position: absolute; right: 15px; top: 0; bottom: 0; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #94a3b8;">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path class="eye-open-path" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            <path class="eye-closed-path" style="display: none;" d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                        </svg>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; margin-top: 1rem;">Update Password</button>
        </form>
    </div>
</div>
</div>

<style>
    /* Ensure padding for custom inputs in case they get overwritten globally */
    .form-input[type="password"] {
        padding-right: 3rem;
    }
</style>
<script>
    function togglePassword(fieldId, icon) {
        const input = document.getElementById(fieldId);
        const openPath = icon.querySelector(".eye-open-path");
        const closedPath = icon.querySelector(".eye-closed-path");
        if (input.type === "password") {
            input.type = "text";
            openPath.style.display = "none";
            closedPath.style.display = "block";
        } else {
            input.type = "password";
            openPath.style.display = "block";
            closedPath.style.display = "none";
        }
    }
</script>
{% endblock %}
