<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - OneMeds</title>
    <meta name="description" content="Sign in to OneMeds with your email or mobile number securely.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    {% load static %}
    <script>
        window.DjangoUrls = {
            home: "{% url 'home' %}",
            login: "{% url 'login' %}",
            register: "{% url 'register' %}",
        };
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body>
    <!-- React mounts the entire login UI here -->
    <div id="react-login-root"></div>

    <!-- Inject Vite React Output -->
    <script type="module" src="{% static 'dist/js/main.js' %}"></script>
</body>
</html>
