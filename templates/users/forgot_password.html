{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="form-card">
        <h2>Forgot Password</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 2rem;">Enter your email to receive a password reset link.</p>
        <form method="post">
            {% csrf_token %}
            {% if error %}
            <div style="color: #ef4444; margin-bottom: 1rem; text-align: center;">{{ error }}</div>
            {% endif %}
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="identifier" class="form-input" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; margin-top: 1rem;">Send Reset Link</button>
        </form>
        <p style="text-align: center; margin-top: 2rem; color: #64748b;">
            Remembered? <a href="{% url 'login' %}" style="color: var(--primary); font-weight: 600;">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}
